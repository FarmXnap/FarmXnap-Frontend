<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Primary -->
    <title>FarmXnap — AI Crop Disease Detection</title>
    <meta name="description" content="Snap a leaf. Diagnose in seconds. Buy the cure instantly. AI-powered crop disease detection for Nigerian farmers." />

    <!-- Theme -->
    <meta name="theme-color" content="#0A1F0F" />
    <meta name="background-color" content="#0A1F0F" />
    <meta name="msapplication-TileColor" content="#0A1F0F" />

    <!-- PWA manifest — required for Android install prompt -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FarmXnap" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Android Chrome — explicit mobile optimised flag -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="FarmXnap" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />

    <!-- Fonts — Fontshare (free, no key needed) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
