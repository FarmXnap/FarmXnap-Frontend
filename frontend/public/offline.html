<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FarmXnap — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      background: #060f08;
      color: #fff;
      font-family: 'Cabinet Grotesk', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      font-family: 'Clash Display', system-ui, sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.4px;
      color: #fff;
      margin-bottom: 40px;
    }
    .logo span { color: #1D9E75; }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(29,158,117,0.1);
      border: 2px solid rgba(29,158,117,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    h1 {
      font-family: 'Clash Display', system-ui, sans-serif;
      font-weight: 800;
      font-size: 26px;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    p {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto 32px;
    }
    button {
      background: #1D9E75;
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 16px 32px;
      font-family: 'Clash Display', system-ui, sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      width: 100%;
      max-width: 320px;
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.85; transform: scale(0.97); }
    .footer {
      position: fixed;
      bottom: 24px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.03em;
    }
    .footer span { color: #1D9E75; }
  </style>
</head>
<body>
  <div class="logo">Farm<span>X</span>nap</div>

  <div class="icon">🌿</div>

  <h1>You're offline</h1>
  <p>No internet connection detected. Check your network and try again — your farm data is safe.</p>

  <button onclick="window.location.reload()">Try again →</button>

  <p class="footer">Built for <span>Nigerian farmers</span> 🇳🇬</p>
</body>
</html>
